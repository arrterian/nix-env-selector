name: Env Selector CI

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v1
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}
    - name: Use JDK
      uses: actions/setup-java@v1
      with:
        java-version: 17
    - name: install
      run: npm install
      env:
        CI: true
    - name: test
      run: npm test
      env:
        CI: true
    - name: build
      run: npm run compile
      env:
        CI: true
